<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>グランドフェス 点数シミュレーター</title>
  <style>
    :root {
      color-scheme: dark;
      --ink: #f8fafc;
      --muted: #9aa4b2;
      --panel: rgba(20, 22, 28, 0.88);
      --panel-strong: rgba(30, 34, 42, 0.96);
      --line: rgba(255, 255, 255, 0.11);
      --teal: #31d0aa;
      --amber: #f4c15d;
      --coral: #ff6b6b;
      --violet: #9b8cff;
      --shadow: 0 24px 70px rgba(0, 0, 0, 0.38);
    }

    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      margin: 0;
      font-family: "Helvetica Neue", "Yu Gothic", "Hiragino Kaku Gothic ProN", Arial, sans-serif;
      background:
        radial-gradient(circle at 15% 12%, rgba(49, 208, 170, 0.22), transparent 34%),
        radial-gradient(circle at 90% 18%, rgba(244, 193, 93, 0.18), transparent 32%),
        linear-gradient(145deg, #111318 0%, #191818 48%, #12151a 100%);
      color: var(--ink);
      padding: 24px;
    }

    .app {
      width: min(1080px, 100%);
      min-height: calc(100vh - 48px);
      margin: 0 auto;
      display: grid;
      grid-template-columns: minmax(320px, 0.9fr) minmax(360px, 1.1fr);
      gap: 18px;
      align-items: stretch;
    }

    .hero,
    .controls {
      background: var(--panel);
      border: 1px solid var(--line);
      box-shadow: var(--shadow);
      backdrop-filter: blur(22px);
    }

    .hero {
      position: sticky;
      top: 24px;
      min-height: calc(100vh - 48px);
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      overflow: hidden;
      border-radius: 8px;
      padding: 28px;
    }

    .hero::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(120deg, rgba(255,255,255,0.13), transparent 30%),
        repeating-linear-gradient(135deg, transparent 0 16px, rgba(255,255,255,0.035) 17px 18px);
      pointer-events: none;
    }

    .hero > * {
      position: relative;
      z-index: 1;
    }

    .kicker {
      display: inline-flex;
      width: fit-content;
      align-items: center;
      gap: 8px;
      color: var(--teal);
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .kicker::before {
      content: "";
      width: 28px;
      height: 2px;
      background: var(--teal);
    }

    h1 {
      margin: 14px 0 12px;
      font-size: clamp(34px, 5vw, 68px);
      line-height: 0.95;
      letter-spacing: 0;
    }

    .lead {
      max-width: 440px;
      margin: 0;
      color: #c6ccd5;
      font-size: 15px;
      line-height: 1.8;
    }

    .score-stage {
      margin-top: 34px;
    }

    .score-label {
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
    }

    .score {
      display: flex;
      align-items: baseline;
      gap: 10px;
      margin-top: 8px;
      font-variant-numeric: tabular-nums;
    }

    #total-score {
      font-size: clamp(72px, 12vw, 148px);
      font-weight: 900;
      line-height: 0.86;
      color: var(--ink);
      text-shadow: 0 0 42px rgba(49, 208, 170, 0.35);
    }

    .score-unit {
      color: var(--amber);
      font-size: 24px;
      font-weight: 900;
    }

    .status-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 22px;
    }

    .badge {
      display: inline-flex;
      min-height: 34px;
      align-items: center;
      border-radius: 999px;
      padding: 7px 13px;
      font-size: 12px;
      font-weight: 900;
      border: 1px solid rgba(255, 255, 255, 0.16);
    }

    .badge-combo {
      background: rgba(255, 107, 107, 0.18);
      color: #ffd2d2;
      box-shadow: 0 0 26px rgba(255, 107, 107, 0.22);
    }

    .badge-single {
      background: rgba(155, 140, 255, 0.16);
      color: #dad5ff;
    }

    .badge-empty {
      background: rgba(255, 255, 255, 0.08);
      color: var(--muted);
    }

    .breakdown {
      display: grid;
      gap: 10px;
      margin-top: 26px;
    }

    .breakdown-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      align-items: center;
      min-height: 44px;
      border-bottom: 1px solid var(--line);
      color: #d8dde5;
      font-size: 13px;
    }

    .breakdown-row:last-child {
      border-bottom: 0;
    }

    .breakdown-row strong {
      display: block;
      color: var(--ink);
      font-size: 14px;
    }

    .value {
      min-width: 76px;
      border-radius: 6px;
      background: rgba(255, 255, 255, 0.08);
      padding: 8px 10px;
      text-align: right;
      color: var(--amber);
      font-family: "SFMono-Regular", Consolas, monospace;
      font-weight: 900;
      font-variant-numeric: tabular-nums;
    }

    .controls {
      border-radius: 8px;
      padding: 22px;
    }

    .section {
      padding: 20px 0;
      border-top: 1px solid var(--line);
    }

    .section:first-child {
      padding-top: 0;
      border-top: 0;
    }

    .section-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 14px;
    }

    h2 {
      margin: 0;
      font-size: 16px;
      letter-spacing: 0;
    }

    .section-chip {
      flex: 0 0 auto;
      border-radius: 999px;
      background: rgba(49, 208, 170, 0.12);
      color: #a8f5e3;
      padding: 6px 10px;
      font-size: 11px;
      font-weight: 800;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .field {
      display: grid;
      gap: 7px;
    }

    label {
      color: #d4d9e1;
      font-size: 12px;
      font-weight: 800;
    }

    select {
      width: 100%;
      min-height: 46px;
      border: 1px solid rgba(255, 255, 255, 0.13);
      border-radius: 6px;
      background: var(--panel-strong);
      color: var(--ink);
      padding: 0 38px 0 12px;
      font: inherit;
      font-size: 14px;
      outline: none;
      appearance: none;
      background-image:
        linear-gradient(45deg, transparent 50%, var(--teal) 50%),
        linear-gradient(135deg, var(--teal) 50%, transparent 50%);
      background-position:
        calc(100% - 18px) 20px,
        calc(100% - 12px) 20px;
      background-size: 6px 6px, 6px 6px;
      background-repeat: no-repeat;
      transition: border-color 160ms ease, box-shadow 160ms ease, transform 160ms ease;
    }

    select:hover,
    select:focus {
      border-color: rgba(49, 208, 170, 0.72);
      box-shadow: 0 0 0 4px rgba(49, 208, 170, 0.1);
    }

    select:active {
      transform: translateY(1px);
    }

    .strategy {
      display: grid;
      gap: 10px;
      margin-top: 2px;
      border-radius: 8px;
      background:
        linear-gradient(135deg, rgba(49, 208, 170, 0.12), rgba(244, 193, 93, 0.1)),
        rgba(255, 255, 255, 0.05);
      border: 1px solid var(--line);
      padding: 14px;
      color: #d9e0e8;
      font-size: 13px;
      line-height: 1.7;
    }

    .strategy strong {
      color: var(--amber);
    }

    .meter {
      width: 100%;
      height: 10px;
      overflow: hidden;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.08);
    }

    .meter-fill {
      width: 0%;
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, var(--teal), var(--amber), var(--coral));
      transition: width 220ms ease;
    }

    @media (max-width: 840px) {
      body {
        padding: 14px;
      }

      .app {
        min-height: auto;
        grid-template-columns: 1fr;
      }

      .hero {
        position: relative;
        top: 0;
        min-height: auto;
      }
    }

    @media (max-width: 560px) {
      body {
        padding: 10px;
      }

      .hero,
      .controls {
        padding: 18px;
      }

      .grid {
        grid-template-columns: 1fr;
      }

      .breakdown-row {
        grid-template-columns: 1fr;
      }

      .value {
        width: 100%;
        text-align: left;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="hero" aria-label="スコア表示">
      <div>
        <div class="kicker">Grand Fes Score</div>
        <h1>点数シミュレーター</h1>
        <p class="lead">技、ひねり、着地、出来栄えを選ぶだけで、合計点とコンボ倍率をその場で確認できます。</p>

        <div class="score-stage">
          <div class="score-label">想定合計得点</div>
          <div class="score">
            <span id="total-score">0</span>
            <span class="score-unit">点</span>
          </div>
          <div class="meter" aria-hidden="true">
            <div class="meter-fill" id="score-meter"></div>
          </div>
          <div class="status-row" id="combo-status"></div>
        </div>
      </div>

      <div class="breakdown" aria-label="計算内訳">
        <div class="breakdown-row">
          <div><strong>技の基本点</strong>選択した技の合計</div>
          <div class="value" id="text-base">0 点</div>
        </div>
        <div class="breakdown-row">
          <div><strong>ひねり加点</strong>難度に応じた追加点</div>
          <div class="value" id="text-twist">0 点</div>
        </div>
        <div class="breakdown-row">
          <div><strong>ボーナス計算</strong>基本点とひねりに倍率を適用</div>
          <div class="value" id="text-subtotal">0 点</div>
        </div>
        <div class="breakdown-row">
          <div><strong>着地</strong>着地の安定度</div>
          <div class="value" id="text-landing">0 点</div>
        </div>
        <div class="breakdown-row">
          <div><strong>出来栄え</strong>姿勢や美しさの評価</div>
          <div class="value" id="text-execution">0 点</div>
        </div>
      </div>
    </section>

    <section class="controls" aria-label="入力欄">
      <div class="section">
        <div class="section-title">
          <h2>実施する技</h2>
          <span class="section-chip">最大4つ</span>
        </div>
        <div class="grid">
          <div class="field">
            <label for="skill1">1つ目の技</label>
            <select id="skill1">
              <option value="0" selected>なし (0点)</option>
              <option value="25">ロンダート (25点)</option>
              <option value="100">バク転 (100点)</option>
              <option value="150">バク宙 / 前宙 / 転宙 (150点)</option>
              <option value="100">側宙 / ハンド (100点)</option>
            </select>
          </div>
          <div class="field">
            <label for="skill2">2つ目の技</label>
            <select id="skill2">
              <option value="0" selected>なし (0点)</option>
              <option value="25">ロンダート (25点)</option>
              <option value="100">バク転 (100点)</option>
              <option value="150">バク宙 / 前宙 / 転宙 (150点)</option>
              <option value="100">側宙 / ハンド (100点)</option>
            </select>
          </div>
          <div class="field">
            <label for="skill3">3つ目の技</label>
            <select id="skill3">
              <option value="0" selected>なし (0点)</option>
              <option value="25">ロンダート (25点)</option>
              <option value="100">バク転 (100点)</option>
              <option value="150">バク宙 / 前宙 / 転宙 (150点)</option>
              <option value="100">側宙 / ハンド (100点)</option>
            </select>
          </div>
          <div class="field">
            <label for="skill4">4つ目の技</label>
            <select id="skill4">
              <option value="0" selected>なし (0点)</option>
              <option value="25">ロンダート (25点)</option>
              <option value="100">バク転 (100点)</option>
              <option value="150">バク宙 / 前宙 / 転宙 (150点)</option>
              <option value="100">側宙 / ハンド (100点)</option>
            </select>
          </div>
        </div>
      </div>

      <div class="section">
        <div class="section-title">
          <h2>ひねりと評価</h2>
          <span class="section-chip">加点項目</span>
        </div>
        <div class="grid">
          <div class="field">
            <label for="twist">ひねりの難度</label>
            <select id="twist">
              <option value="0" selected>なし (0点)</option>
              <option value="100">半ひねり (100点)</option>
              <option value="200">1回ひねり (200点)</option>
              <option value="300">1回半ひねり (300点)</option>
              <option value="400">2回ひねり (400点)</option>
            </select>
          </div>
          <div class="field">
            <label for="landing">着地</label>
            <select id="landing">
              <option value="100">完全着地 (100点)</option>
              <option value="50">1歩以上動いて着地 (50点)</option>
              <option value="0" selected>転倒または大きく乱れた (0点)</option>
            </select>
          </div>
          <div class="field">
            <label for="execution">出来栄え</label>
            <select id="execution">
              <option value="20">Sランク (20点)</option>
              <option value="10">Aランク (10点)</option>
              <option value="0" selected>Bランク (0点)</option>
            </select>
          </div>
        </div>
      </div>

      <div class="section">
        <div class="strategy">
          <strong>戦略ポイント</strong>
          技を2つ以上つなげると連続技コンボが発動し、基本点とひねり加点に1.2倍のボーナスが入ります。
        </div>
      </div>
    </section>
  </main>

  <script>
    const ids = ["skill1", "skill2", "skill3", "skill4", "twist", "landing", "execution"];
    const maxVisualScore = 1000;

    function yen(value) {
      return `${Math.round(value)} 点`;
    }

    function calculateScore() {
      const skills = ids.slice(0, 4).map((id) => Number(document.getElementById(id).value));
      const twistScore = Number(document.getElementById("twist").value);
      const landingScore = Number(document.getElementById("landing").value);
      const executionScore = Number(document.getElementById("execution").value);

      const skillCount = skills.filter((score) => score > 0).length;
      const baseTotal = skills.reduce((sum, score) => sum + score, 0);
      const isCombo = skillCount >= 2;
      const multiplier = isCombo ? 1.2 : 1;
      const subtotal = (baseTotal + twistScore) * multiplier;
      const totalScore = subtotal + landingScore + executionScore;

      document.getElementById("text-base").innerText = yen(baseTotal);
      document.getElementById("text-twist").innerText = yen(twistScore);
      document.getElementById("text-subtotal").innerText = `${baseTotal} + ${twistScore} × ${multiplier.toFixed(1)} = ${yen(subtotal)}`;
      document.getElementById("text-landing").innerText = yen(landingScore);
      document.getElementById("text-execution").innerText = yen(executionScore);
      document.getElementById("total-score").innerText = Math.round(totalScore);
      document.getElementById("score-meter").style.width = `${Math.min(totalScore / maxVisualScore * 100, 100)}%`;

      const status = document.getElementById("combo-status");
      if (skillCount === 0) {
        status.innerHTML = '<span class="badge badge-empty">技を選択してください</span>';
      } else if (isCombo) {
        status.innerHTML = `<span class="badge badge-combo">連続技コンボ ${skillCount}つ / 1.2倍</span>`;
      } else {
        status.innerHTML = '<span class="badge badge-single">単発技 / 1.0倍</span>';
      }
    }

    ids.forEach((id) => {
      document.getElementById(id).addEventListener("change", calculateScore);
    });

    calculateScore();
  </script>
</body>
</html>
