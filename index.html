<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>グランドフェス 点数シミュレーター</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Zen+Kaku+Gothic+New:wght@400;500;700;900&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #0a0e1a;
    --panel: #10162a;
    --panel-alt: #161d35;
    --panel-raised: #1c2440;
    --gold: #ffc93c;
    --gold-dim: #b8912a;
    --coral: #ff5470;
    --teal: #3ddc97;
    --ink: #f5f7fa;
    --muted: #7c87a3;
    --line: rgba(255,255,255,0.09);
    --radius: 14px;
  }
  *{ box-sizing: border-box; }
  html{ -webkit-tap-highlight-color: transparent; }
  body{
    margin:0;
    padding: 28px 16px 60px;
    background:
      radial-gradient(circle at 15% 0%, rgba(255,201,60,0.08), transparent 45%),
      radial-gradient(circle at 85% 15%, rgba(61,220,151,0.07), transparent 40%),
      var(--bg);
    color: var(--ink);
    font-family: 'Zen Kaku Gothic New', 'Hiragino Sans', sans-serif;
    min-height: 100vh;
  }
  .wrap{ max-width: 560px; margin: 0 auto; }

  /* ---------- Header ---------- */
  .eyebrow{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:10px;
    font-family:'Oswald', sans-serif;
    font-size: 12px;
    letter-spacing: 4px;
    color: var(--gold);
    font-weight: 600;
    margin-bottom: 6px;
  }
  .eyebrow::before, .eyebrow::after{
    content:'';
    width: 28px; height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold-dim));
  }
  .eyebrow::after{ background: linear-gradient(90deg, var(--gold-dim), transparent); }
  h1{
    text-align:center;
    font-size: 26px;
    font-weight: 900;
    margin: 0 0 4px;
    letter-spacing: 0.5px;
  }
  .subtitle{
    text-align:center;
    color: var(--muted);
    font-size: 13px;
    margin-bottom: 26px;
    letter-spacing: 0.5px;
  }

  /* ---------- Scoreboard ---------- */
  .board{
    position: relative;
    background: linear-gradient(180deg, var(--panel-raised), var(--panel));
    border: 1px solid var(--line);
    border-radius: 20px;
    padding: 26px 20px 20px;
    margin-bottom: 26px;
    overflow: hidden;
    box-shadow: 0 20px 50px -20px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.04);
  }
  .board::before{
    content:'';
    position:absolute;
    top:-40%; left:-10%;
    width: 60%; height: 180%;
    background: radial-gradient(ellipse at center, rgba(255,201,60,0.08), transparent 70%);
    pointer-events:none;
  }
  .board-label{
    text-align:center;
    font-family:'Oswald', sans-serif;
    font-size: 11px;
    letter-spacing: 3px;
    color: var(--muted);
    font-weight: 600;
  }
  .score-display{
    text-align:center;
    line-height: 1;
    margin: 10px 0 20px;
    position: relative;
  }
  .score-display .num{
    font-family: 'JetBrains Mono', monospace;
    font-size: 68px;
    font-weight: 700;
    color: var(--gold);
    text-shadow: 0 0 18px rgba(255,201,60,0.45), 0 0 2px rgba(255,201,60,0.8);
    letter-spacing: 1px;
    transition: transform 0.18s ease;
    display: inline-block;
  }
  .score-display .num.bump{ transform: scale(1.06); }
  .score-display .unit{
    font-family:'Oswald', sans-serif;
    font-size: 16px;
    color: var(--muted);
    margin-left: 6px;
    letter-spacing: 1px;
  }

  .ticket{
    background: rgba(0,0,0,0.22);
    border-radius: 12px;
    padding: 4px 16px;
    position: relative;
  }
  .trow{
    display:flex;
    align-items:center;
    justify-content: space-between;
    padding: 10px 0;
    border-bottom: 1px dashed var(--line);
    font-size: 13px;
  }
  .trow:last-child{ border-bottom:none; }
  .trow .label{
    display:flex;
    align-items:center;
    gap: 8px;
    color: #cbd2e3;
    font-weight: 500;
  }
  .trow .label .icon{ font-size: 15px; }
  .trow .val{
    font-family:'JetBrains Mono', monospace;
    font-weight: 700;
    font-size: 14px;
    color: var(--ink);
  }
  .trow.subtotal{
    background: rgba(255,201,60,0.07);
    margin: 4px -16px;
    padding: 10px 16px;
    border-radius: 8px;
    border-bottom: none;
  }
  .trow.subtotal .label{ color: var(--gold); font-weight:700; }
  .trow.subtotal .val{
    font-size: 12px;
    color: var(--gold);
    background: rgba(0,0,0,0.3);
    padding: 3px 8px;
    border-radius: 6px;
  }

  .status-chip{
    display:inline-flex;
    align-items:center;
    gap:6px;
    padding: 4px 12px;
    border-radius: 999px;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.5px;
  }
  .status-chip.combo{
    background: linear-gradient(90deg, var(--coral), #ff8a5c);
    color: #fff;
    box-shadow: 0 0 0 0 rgba(255,84,112,0.5);
    animation: ring 1.8s infinite;
  }
  .status-chip.single{
    background: rgba(124,135,163,0.18);
    color: var(--muted);
  }
  .status-chip.empty{
    color: var(--muted);
    font-weight: 500;
  }
  @keyframes ring{
    0%{ box-shadow: 0 0 0 0 rgba(255,84,112,0.45); }
    70%{ box-shadow: 0 0 0 8px rgba(255,84,112,0); }
    100%{ box-shadow: 0 0 0 0 rgba(255,84,112,0); }
  }

  /* ---------- Sections ---------- */
  .section-title{
    display:flex;
    align-items:baseline;
    gap: 10px;
    font-family:'Oswald', sans-serif;
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 1px;
    color: var(--ink);
    margin: 30px 4px 14px;
  }
  .section-title .step{
    width: 22px; height:22px;
    border-radius: 6px;
    background: var(--panel-alt);
    border: 1px solid var(--line);
    color: var(--teal);
    display:flex; align-items:center; justify-content:center;
    font-size: 12px;
    font-weight: 700;
  }

  .skill-grid{
    display:grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }
  .field{
    margin-bottom: 12px;
  }
  .field label{
    display:block;
    font-size: 11.5px;
    font-weight: 700;
    color: var(--muted);
    letter-spacing: 0.3px;
    margin-bottom: 6px;
  }
  .select-wrap{
    position: relative;
  }
  .select-wrap::after{
    content:'▾';
    position:absolute;
    right: 12px; top:50%;
    transform: translateY(-50%);
    color: var(--gold);
    font-size: 11px;
    pointer-events:none;
  }
  select{
    width:100%;
    appearance:none;
    -webkit-appearance:none;
    background: var(--panel-alt);
    border: 1px solid var(--line);
    color: var(--ink);
    padding: 11px 30px 11px 12px;
    border-radius: 10px;
    font-size: 14px;
    font-family: inherit;
    cursor:pointer;
    transition: border-color 0.15s, background 0.15s;
  }
  select:hover{ border-color: rgba(255,201,60,0.4); }
  select:focus-visible{
    outline: none;
    border-color: var(--gold);
    box-shadow: 0 0 0 3px rgba(255,201,60,0.2);
  }

  .hint{
    display:flex;
    gap: 12px;
    background: linear-gradient(135deg, rgba(61,220,151,0.09), rgba(61,220,151,0.03));
    border: 1px solid rgba(61,220,151,0.25);
    border-radius: 12px;
    padding: 14px 16px;
    margin-top: 26px;
    font-size: 12.5px;
    line-height: 1.7;
    color: #cfe9dd;
  }
  .hint .icon{ font-size: 18px; flex-shrink:0; }
  .hint strong{ color: var(--teal); }

  @media (max-width: 380px){
    .score-display .num{ font-size: 54px; }
    .skill-grid{ grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<div class="wrap">
  <div class="eyebrow">GRAND FES SCORING</div>
  <h1>点数シミュレーター</h1>
  <div class="subtitle">技の組み合わせを選んで、最高のスコアを狙おう</div>

  <div class="board">
    <div class="board-label">想定合計得点</div>
    <div class="score-display">
      <span class="num" id="total-score">0</span><span class="unit">点</span>
    </div>

    <div class="ticket">
      <div class="trow">
        <div class="label"><span class="icon">🤸</span>技の基本点合計</div>
        <div class="val" id="text-base">0 点</div>
      </div>
      <div class="trow">
        <div class="label"><span class="icon">🌀</span>ひねりの点数</div>
        <div class="val" id="text-twist">0 点</div>
      </div>
      <div class="trow">
        <div class="label"><span class="icon">📢</span>技の判定</div>
        <div id="combo-status"><span class="status-chip empty">未選択</span></div>
      </div>
      <div class="trow subtotal">
        <div class="label">🧮 ボーナス計算小計</div>
        <div class="val" id="text-subtotal">0 点</div>
      </div>
      <div class="trow">
        <div class="label"><span class="icon">👟</span>着地の点数</div>
        <div class="val" id="text-landing">0 点</div>
      </div>
      <div class="trow">
        <div class="label"><span class="icon">✨</span>出来栄えの点数</div>
        <div class="val" id="text-execution">0 点</div>
      </div>
    </div>
  </div>

  <div class="section-title"><span class="step">1</span>実施する技（最大4つまで連続可能）</div>
  <div class="skill-grid">
    <div class="field">
      <label for="skill1">1つ目の技</label>
      <div class="select-wrap">
        <select id="skill1" onchange="calculateScore()">
          <option value="0" selected>なし (0点)</option>
          <option value="25">ロンダート (25点)</option>
          <option value="100">バク転 (100点)</option>
          <option value="150">後宙/前宙/転宙 (150点)</option>
          <option value="100">側宙/転回 (100点)</option>
        </select>
      </div>
    </div>
    <div class="field">
      <label for="skill2">2つ目の技</label>
      <div class="select-wrap">
        <select id="skill2" onchange="calculateScore()">
          <option value="0" selected>なし (0点)</option>
          <option value="25">ロンダート (25点)</option>
          <option value="100">バク転 (100点)</option>
          <option value="150">後宙/前宙/転宙 (150点)</option>
          <option value="100">側宙/転回 (100点)</option>
        </select>
      </div>
    </div>
    <div class="field">
      <label for="skill3">3つ目の技</label>
      <div class="select-wrap">
        <select id="skill3" onchange="calculateScore()">
          <option value="0" selected>なし (0点)</option>
          <option value="25">ロンダート (25点)</option>
          <option value="100">バク転 (100点)</option>
          <option value="150">後宙/前宙/転宙 (150点)</option>
          <option value="100">側宙/転回 (100点)</option>
        </select>
      </div>
    </div>
    <div class="field">
      <label for="skill4">4つ目の技</label>
      <div class="select-wrap">
        <select id="skill4" onchange="calculateScore()">
          <option value="0" selected>なし (0点)</option>
          <option value="25">ロンダート (25点)</option>
          <option value="100">バク転 (100点)</option>
          <option value="150">後宙/前宙/転宙 (150点)</option>
          <option value="100">側宙/転回 (100点)</option>
        </select>
      </div>
    </div>
  </div>

  <div class="section-title"><span class="step">2</span>ひねり・着地・美しさ</div>
  <div class="field">
    <label for="twist">ひねりの難度</label>
    <div class="select-wrap">
      <select id="twist" onchange="calculateScore()">
        <option value="0" selected>なし (0点)</option>
        <option value="100">半ひねり (100点)</option>
        <option value="200">1回ひねり (200点)</option>
        <option value="300">1回半ひねり (300点)</option>
        <option value="400">2回ひねり (400点)</option>
      </select>
    </div>
  </div>
  <div class="field">
    <label for="landing">着地</label>
    <div class="select-wrap">
      <select id="landing" onchange="calculateScore()">
        <option value="100">完璧着地 (100点)</option>
        <option value="50">1歩以上動いて着地 (50点)</option>
        <option value="0" selected>転倒・尻もち (0点)</option>
      </select>
    </div>
  </div>
  <div class="field">
    <label for="execution">出来栄え（姿勢の美しさなど）</label>
    <div class="select-wrap">
      <select id="execution" onchange="calculateScore()">
        <option value="20">Sランク (20点)</option>
        <option value="10">Aランク (10点)</option>
        <option value="0" selected>Bランク (0点)</option>
      </select>
    </div>
  </div>

  <div class="hint">
    <span class="icon">💡</span>
    <div><strong>戦略の重要ヒント：</strong>技をたくさん繋げると連続技コンボ（×1.2倍）が発動！自分の得意技をたくさん繋げて最高の構成を見つけてね。</div>
  </div>
</div>

<script>
function calculateScore(){
  const s1 = parseInt(document.getElementById('skill1').value);
  const s2 = parseInt(document.getElementById('skill2').value);
  const s3 = parseInt(document.getElementById('skill3').value);
  const s4 = parseInt(document.getElementById('skill4').value);
  const twistScore = parseInt(document.getElementById('twist').value);
  const landingScore = parseInt(document.getElementById('landing').value);
  const execScore = parseInt(document.getElementById('execution').value);

  let skillCount = 0;
  if (s1 > 0) skillCount++;
  if (s2 > 0) skillCount++;
  if (s3 > 0) skillCount++;
  if (s4 > 0) skillCount++;

  const baseTotal = s1 + s2 + s3 + s4;
  const isCombo = skillCount >= 2;
  const multiplier = isCombo ? 1.2 : 1.0;

  const subtotal = (baseTotal + twistScore) * multiplier;
  const totalScore = subtotal + landingScore + execScore;

  document.getElementById('text-base').innerText = baseTotal + ' 点';
  document.getElementById('text-twist').innerText = twistScore + ' 点';

  const statusEl = document.getElementById('combo-status');
  if (skillCount === 0){
    statusEl.innerHTML = '<span class="status-chip empty">未選択</span>';
  } else if (isCombo){
    statusEl.innerHTML = `<span class="status-chip combo">連続技(${skillCount}つ) ×1.2</span>`;
  } else {
    statusEl.innerHTML = '<span class="status-chip single">単発技 ×1.0</span>';
  }

  document.getElementById('text-subtotal').innerText =
    `(${baseTotal} + ${twistScore}) × ${multiplier} = ${subtotal.toFixed(0)} 点`;

  document.getElementById('text-landing').innerText = landingScore + ' 点';
  document.getElementById('text-execution').innerText = execScore + ' 点';

  const totalEl = document.getElementById('total-score');
  totalEl.innerText = totalScore.toFixed(0);
  totalEl.classList.remove('bump');
  void totalEl.offsetWidth;
  totalEl.classList.add('bump');
}

calculateScore();
</script>

</body>
</html>
